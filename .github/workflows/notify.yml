name: Toji Daily Reminder

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Send Toji reminder
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DAY=$(date +%u)
          if [ "$DAY" -eq 1 ] || [ "$DAY" -eq 3 ] || [ "$DAY" -eq 5 ]; then
            MSG="💪 Strength day — Your kettlebell circuit is waiting. 3 rounds. Leave two reps in the tank. Open the Toji app and start your session."
          else
            MSG="🚶 Cardio day — Walking pad: 20-30 min, incline 3-5%. Stay lean, stay dangerous. Log it in the Toji app."
          fi
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}"
